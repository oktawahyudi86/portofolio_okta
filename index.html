    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, #f1f5f9 0%, transparent 40%),
          radial-gradient(circle at bottom left, #f1f5f9 0%, transparent 40%),
          #f8fafc;
      }
      #root {
        opacity: 0;
        transition: opacity 0.32s ease;
      }
      body[data-app-ready="true"] #root {
        opacity: 1;
      }
      #boot-skeleton {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(248, 250, 252, 0.96);
        backdrop-filter: blur(10px);
        transition: opacity 0.28s ease, visibility 0.28s ease;
      }
      #boot-skeleton.boot-skeleton--hidden {
        opacity: 0;
        visibility: hidden;
      }
      .boot-shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 7.75rem 1.5rem 2.5rem;
      }
      .boot-grid {
        display: grid;
        gap: 2rem;
      }
      .boot-skel {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        border: 1px solid rgba(192, 208, 218, 0.45);
        background: linear-gradient(90deg, #edf2f7 0%, #f8fbfd 24%, #ffffff 42%, #eef4f8 62%, #edf2f7 100%);
        background-size: 220% 100%;
        box-shadow: 0 10px 28px rgba(148, 163, 184, 0.08);
        animation: boot-shimmer 1.6s linear infinite;
      }
      .boot-pill { height: 40px; width: 172px; border-radius: 999px; }
      .boot-title-lg { height: 68px; width: min(100%, 540px); }
      .boot-title-md { height: 68px; width: min(100%, 470px); }
      .boot-card { height: 138px; width: min(100%, 580px); border-radius: 32px; }
      .boot-stat-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        max-width: 420px;
      }
      .boot-stat { height: 84px; border-radius: 24px; }
      .boot-hero {
        height: 340px;
        width: 100%;
        border-radius: 34px;
      }
      .boot-mini-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }
      .boot-mini { height: 112px; border-radius: 24px; }
      .boot-lower {
        margin-top: 2rem;
        display: grid;
        gap: 1.25rem;
      }
      .boot-lower-card {
        height: 160px;
        border-radius: 28px;
      }
      @keyframes boot-shimmer {
        0% { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }
      @media (min-width: 1024px) {
        .boot-grid {
          grid-template-columns: 1.15fr 0.85fr;
          align-items: start;
        }
        .boot-lower {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-skeleton" aria-hidden="true">
      <div class="boot-shell">
        <div class="boot-grid">
          <div style="display:flex; flex-direction:column; gap:1.5rem;">
            <div class="boot-skel boot-pill"></div>
            <div class="boot-skel boot-title-lg"></div>
            <div class="boot-skel boot-title-md"></div>
            <div class="boot-skel boot-card"></div>
            <div class="boot-stat-row">
              <div class="boot-skel boot-stat"></div>
              <div class="boot-skel boot-stat"></div>
            </div>
          </div>
          <div style="display:flex; flex-direction:column; gap:1.25rem;">
            <div class="boot-skel boot-hero"></div>
            <div class="boot-mini-grid">
              <div class="boot-skel boot-mini"></div>
              <div class="boot-skel boot-mini"></div>
            </div>
          </div>
        </div>
        <div class="boot-lower">
          <div class="boot-skel boot-lower-card"></div>
          <div class="boot-skel boot-lower-card"></div>
          <div class="boot-skel boot-lower-card"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
