<!doctype html>
<html lang="id">

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;

          linear-gradient(180deg, #f8fbf8 0%, #e7ede8 100%);

      }

      .card {
        width: min(100%, 540px);
        padding: 28px;

        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: rgba(22, 48, 61, 0.78);
      }

      a {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 18px;
        border-radius: 999px;
        background: linear-gradient(135deg, #16303d, #72b39a);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>CV Okta Wahyudi</h1>
